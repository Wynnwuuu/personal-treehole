[package]
name = "personal_treehole_tauri"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
directories = "5.0"
rusqlite = "0.29"
uuid = { version = "1.4", features = ["v4"] }
tauri = { version = "1.4.4", features = ["api-all"] }
